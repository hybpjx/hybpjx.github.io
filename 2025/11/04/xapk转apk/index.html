 class="hljs-keyword">def</span> <span class="hljs-title function_">copy_obb</span>(<span class="hljs-params">base, dst</span>):<br>    <span class="hljs-keyword">for</span> root, dirs, _ <span class="hljs-keyword">in</span> os.walk(base):<br>        <span class="hljs-keyword">for</span> d <span class="hljs-keyword">in</span> dirs:<br>            <span class="hljs-keyword">if</span> d == <span class="hljs-string">&#x27;obb&#x27;</span>:<br>                shutil.copytree(os.path.join(root, d), os.path.join(dst, d), dirs_exist_ok=<span class="hljs-literal">True</span>)<br><br><span class="hljs-keyword">def</span> <span class="hljs-title function_">adb_install_multiple</span>(<span class="hljs-params">apk_dir</span>):<br>    apk_list = <span class="hljs-built_in">sorted</span>(find_files(apk_dir, <span class="hljs-string">&#x27;.apk&#x27;</span>))<br>    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> apk_list:<br>        <span class="hljs-built_in">print</span>(<span class="hljs-string">&#x27;no apk files to install&#x27;</span>)<br>        <span class="hljs-keyword">return</span><br>    <span class="hljs-built_in">print</span>(<span class="hljs-string">&#x27;installing via adb...&#x27;</span>)<br>    cmd = [<span class="hljs-string">&#x27;adb&#x27;</span>, <span class="hljs-string">&#x27;install-multiple&#x27;</span>] + apk_list<br>    <span class="hljs-keyword">try</span>:<br>        subprocess.run(cmd, check=<span class="hljs-literal">True</span>)<br>        <span class="hljs-built_in">print</span>(<span class="hljs-string">&#x27;install success&#x27;</span>)<br>    <span class="hljs-keyword">except</span> subprocess.CalledProcessError:<br>        <span class="hljs-built_in">print</span>(<span class="hljs-string">&#x27;install failed&#x27;</span>)<br><br><span class="hljs-keyword">def</span> <span class="hljs-title function_">convert_xapk</span>(<span class="hljs-params">xapk_path, output_dir=<span class="hljs-literal">None</span>, auto_install=<span class="hljs-literal">False</span></span>):<br>    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> os.path.exists(xapk_path):<br>        <span class="hljs-built_in">print</span>(<span class="hljs-string">&#x27;file not found&#x27;</span>)<br>        <span class="hljs-keyword">return</span><br>    <span class="hljs-keyword">if</span> output_dir <span class="hljs-keyword">is</span> <span class="hljs-literal">None</span>:<br>        output_dir = os.path.splitext(xapk_path)[<span class="hljs-number">0</span>]<br>    os.makedirs(output_dir, exist_ok=<span class="hljs-literal">True</span>)<br><br>    unzip_file(xapk_path, output_dir)<br>    apk_dir = os.path.join(output_dir, <span class="hljs-string">&#x27;apk&#x27;</span>)<br>    obb_dir = os.path.join(output_dir, <span class="hljs-string">&#x27;obb&#x27;</span>)<br><br>    apk_files = find_files(output_dir, <span class="hljs-string">&#x27;.apk&#x27;</span>)<br>    <span class="hljs-keyword">if</span> apk_files:<br>        copy_files(apk_files, apk_dir)<br>        <span class="hljs-built_in">print</span>(<span class="hljs-string">&#x27;apk extracted&#x27;</span>)<br><br>    copy_obb(output_dir, obb_dir)<br>    <span class="hljs-built_in">print</span>(<span class="hljs-string">&#x27;obb extracted&#x27;</span>)<br><br>    <span class="hljs-keyword">if</span> auto_install:<br>        adb_install_multiple(apk_dir)<br><br>    <span class="hljs-built_in">print</span>(<span class="hljs-string">&#x27;done:&#x27;</span>, output_dir)<br><br><span class="hljs-keyword">if</span> __name__ == <span class="hljs-string">&#x27;__main__&#x27;</span>:<br>    <span class="hljs-keyword">if</span> <span class="hljs-built_in">len</span>(sys.argv) &lt; <span class="hljs-number">2</span>:<br>        <span class="hljs-built_in">print</span>(<span class="hljs-string">&#x27;usage: python xapk_to_apk.py app.xapk [output_dir] [--install]&#x27;</span>)<br>    <span class="hljs-keyword">else</span>:<br>        xapk = sys.argv[<span class="hljs-number">1</span>]<br>        out = sys.argv[<span class="hljs-number">2</span>] <span class="hljs-keyword">if</span> <span class="hljs-built_in">len</span>(sys.argv) &gt; <span class="hljs-number">2</span> <span class="hljs-keyword">and</span> <span class="hljs-keyword">not</span> sys.argv[<span class="hljs-number">2</span>].startswith(<span class="hljs-string">&#x27;--&#x27;</span>) <span class="hljs-keyword">else</span> <span class="hljs-literal">None</span><br>        install_flag = <span class="hljs-string">&#x27;--install&#x27;</span> <span class="hljs-keyword">in</span> sys.argv<br>        convert_xapk(xapk, out, install_flag)<br></code></pre></td></tr></table></figure>
